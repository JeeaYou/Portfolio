<!-- templates/components/foot.html -->
<footer id="dkFoot" class="t-footer" role="contentinfo">
  <div class="t-footer-inner">

    <div class="footer-stats">
      <span class="footer-stat">
        <span class="stat-icon">◉</span>
        <b>{{ total_visits or "0" }}</b>
      </span>

      <span class="footer-divider"></span>

      <span class="footer-stat">
        <span class="stat-icon">Today</span>
        <b class="today-num">{{ today_visits or "0" }}</b>
      </span>

      <span class="footer-divider"></span>

      <span class="footer-stat">
        <span class="stat-icon">Yesterday</span>
        <b class="yesterday-num">{{ yesterday_visits or "0" }}</b>
      </span>
    </div>

    <div class="footer-copy">
      © 2026 Jeea. All rights reserved.
    </div>

  </div>
</footer>
